<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码充值</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            font-family: "Microsoft Yahei", sans-serif;
        }
        .qrcode {
            width: 260px;
            height: 260px;
            background-color: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .qrcode img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tip {
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="qrcode">
        <!-- 这里换成你的二维码图片 -->
        <img src="./images/qrcode.webp" alt="充值二维码">
    </div>
    <div class="tip">请扫码充值</div>
    <div style="margin-top: 20px;"><a href="./index.html">返回主页</a></div>
</body>
</html>
